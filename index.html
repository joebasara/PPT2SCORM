<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPT2SCORM Tools</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-63S810VT70"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag('js', new Date());
    gtag('config', 'G-63S810VT70');
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      text-align: center;
      padding: 50px;
      margin: 0;
    }

    h1 {
      color: #333;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      color: #555;
      margin-bottom: 40px;
    }

    .download-btn {
      display: inline-block;
      padding: 15px 30px;
      margin: 10px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background-color: #007bff;
      text-decoration: none;
      border-radius: 8px;
      transition: background-color 0.3s ease;
    }

    .download-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>PPT2SCORM Tools</h1>
  <p>Download the tools to manage and publish your PowerPoint to SCORM packages quickly and easily.</p>

  <a
    class="download-btn"
    href="https://github.com/joebasara/PPT2SCORM/releases/download/PPT2SCORM/PPT2SCORM_Publisher.exe"
    data-label="PPT2SCORM_Publisher.exe"
  >
    Download PPT2SCORM Publisher
  </a>

  <a
    class="download-btn"
    href="https://github.com/joebasara/PPT2SCORM/releases/download/PPT2SCORM/PPTLayerManager.exe"
    data-label="PPTLayerManager.exe"
  >
    Download PPT Layer Manager
  </a>

  <script>
    document.querySelectorAll('.download-btn').forEach(function (button) {
      button.addEventListener('click', function (event) {
        event.preventDefault();

        var url = button.getAttribute('href');
        var label = button.getAttribute('data-label');
        var redirected = false;

        function goToDownload() {
          if (!redirected) {
            redirected = true;
            window.location.href = url;
          }
        }

        gtag('event', 'download_click', {
          event_category: 'engagement',
          event_label: label,
          transport_type: 'beacon',
          event_callback: goToDownload
        });

        setTimeout(goToDownload, 700);
      });
    });
  </script>
</body>
</html>
