<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPT2SCORM Tools</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-63S810VT70"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag('js', new Date());
    gtag('config', 'G-63S810VT70');
  </script>

  <style>
    :root {
      --bg-pink: #f3e1e6;
      --purple: #5b57d9;
      --purple-light: #d7d2fb;
      --white: #ffffff;
      --shadow: 0 18px 40px rgba(91, 87, 217, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg-pink);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .downloads-window {
      width: 100%;
      max-width: 760px;
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .window-title {
      background: var(--purple);
      color: var(--white);
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 22px;
    }

    .downloads-list {
      padding: 22px;
    }

    .download-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      border: 1px solid var(--purple-light);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 14px;
    }

    .download-row:last-child {
      margin-bottom: 0;
    }

    .file-info {
      flex: 1;
    }

    .file-name {
      margin: 0 0 6px 0;
      font-size: 22px;
      font-weight: bold;
      color: var(--purple);
    }

    .file-size {
      margin: 0;
      font-size: 14px;
      color: var(--purple);
      opacity: 0.7;
    }

    .download-btn {
      min-width: 130px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: bold;
      color: var(--purple);
      background-color: var(--white);
      text-decoration: none;
      border: 1px solid var(--purple);
      border-radius: 10px;
      transition: 0.25s;
    }

    .download-btn:hover {
      background-color: var(--purple);
      color: var(--white);
    }

    .illustration {
      text-align: center;
      padding: 10px 10px 30px;
    }

    .illustration img {
      max-width: 120px;
      width: 100%;
      height: auto;
    }

    @media (max-width: 640px) {
      .download-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .download-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="downloads-window">
    <div class="window-title">DOWNLOADS</div>

    <div class="downloads-list">

      <!-- Row 1 -->
      <div class="download-row">
        <div class="file-info">
          <p class="file-name">PPT2SCORM_Publisher</p>
          <p class="file-size">EXE • 12.4 MB</p>
        </div>
        <a class="download-btn"
          href="https://github.com/joebasara/PPT2SCORM/releases/download/PPT2SCORM/PPT2SCORM_Publisher.exe"
          onclick="trackDownload(event, 'PPT2SCORM_Publisher.exe', this.href)">
          Download
        </a>
      </div>

      <!-- Row 2 -->
      <div class="download-row">
        <div class="file-info">
          <p class="file-name">PPTLayerManager</p>
          <p class="file-size">EXE • 8.7 MB</p>
        </div>
        <a class="download-btn"
          href="https://github.com/joebasara/PPT2SCORM/releases/download/PPT2SCORM/PPTLayerManager.exe"
          onclick="trackDownload(event, 'PPTLayerManager.exe', this.href)">
          Download
        </a>
      </div>

      <!-- Row 3 -->
      <div class="download-row">
        <div class="file-info">
          <p class="file-name">Tutorial (PDF)</p>
          <p class="file-size">PDF • 2.1 MB</p>
        </div>
        <a class="download-btn"
          href="https://github.com/joebasara/PPT2SCORM/releases/download/PPT2SCORM/PPT2SCORM_Tutorial.pdf"
          onclick="trackDownload(event, 'PPT2SCORM_Tutorial.pdf', this.href)">
          Download
        </a>
      </div>

      <!-- Row 4 -->
      <div class="download-row">
        <div class="file-info">
          <p class="file-name">Demo Video</p>
          <p class="file-size">MP4 • 45.0 MB</p>
        </div>
        <a class="download-btn"
          href="https://github.com/joebasara/PPT2SCORM/releases/download/PPT2SCORM/PPT2SCORM_Demo_Video.mp4"
          onclick="trackDownload(event, 'PPT2SCORM_Demo_Video.mp4', this.href)">
          Download
        </a>
      </div>

    </div>

    <!-- Illustration -->
    <div class="illustration">
      <img src="https://joebasara.github.io/PPT2SCORM/onmyway.png" alt="Illustration">
    </div>
  </div>

  <script>
    function trackDownload(event, fileName, url) {
      event.preventDefault();

      try {
        gtag('event', 'file_download', {
          file_name: fileName,
          link_url: url,
          transport_type: 'beacon'
        });
      } catch (error) {
        console.error('GA error:', error);
      }

      setTimeout(function () {
        window.location.href = url;
      }, 1000);
    }
  </script>
</body>
</html>
